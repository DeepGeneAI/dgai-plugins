        And Predictive Data\",\n            \"gene\": [\n              \"OTC\"\n            ],\n
        \           \"geneType\": \"nuclear\",\n            \"instructionsToUse\":
        \"*   c.955 is the boundary for nonsense mediated decay (NMD).\_ Nonsense
        or frameshift variants including or upstream of c.955 are expected to undergo
        NMD and lead to loss of OTC.\\n*   PVS1 is applicable to initiation codon
        variants and all canonical splice variants as suggested in Tayoun et al, 2018,
        as the c.1A>T sequence variant, resulting in p.M1L amino acid substitution,
        causes severe neonatal disease \\\\[PMID:16786505\\\\].\\n*   Removal of one
        or more exons that are spliced in-frame (exons 6, 7, 8, 9 and 10) will prevent
        folding of the protein lacking amino acids encoded by those exons \\\\[PMID:
        19475717, 1627356, 23278509, 16786505\\\\]\_\\n*   PVS1 is applicable to frameshift
        and nonsense sequence variants upstream of c.1033 in\_OTC.\_\\n    *   The
        H11 alpha helix of OTC (encoded by amino acids 322-344) is critical for the
        correct folding of OTC protein \\\\[PMID:9852088\\\\].\_\_\\n    *   Several
        variants predicted to escape NMD, but alter the H11 alpha helix are reported
