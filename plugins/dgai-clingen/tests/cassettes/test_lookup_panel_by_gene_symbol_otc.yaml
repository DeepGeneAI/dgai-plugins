        \"nuclear\",\n            \"instructionsToUse\": \"*   The incidence for OTC
        deficiency is as high as 1:14,000 or 0.007%, however other studies suggest
        a prevalence of 1:70,000 (PMID:24006547).\_ The most common pathogenic variant
        in population databases is p.Arg40Cys, which is associated with late onset
        OTC Deficiency (PMID: 23209112, 7860066, 11260212, others) and present in
        17 heterozygotes and 6 hemizygote in gnomAD(v4.0.0) (Allele frequency=0.001546%,
        PopMax frequency=0.00436325% in European populations).\_ Given these data,
        an allele frequency >0.01 (1.0%) or present in \u2265 10 (female) homozygotes
        or (male) hemizygotes in gnomAD is set as stand alone evidence of a Benign
        variant.\_\\n*   Both BS1 and BS2 cannot be applied if the same or overlapping
        dataset(s) are used to assess population data\\n*   Variants known to be associated
        with late onset OTC deficiency may be present in frequency higher than expected
        for a pathogenic variant in OTC and with homozygotes and/or hemizygotes in
        population databases.\_ Known variants for which Benign population codes (BA1,
        BS1, BS2) are not applicable are included in the BS1 exception list for OTC\\n\\nBS1
        exception list for OTC:\_\\n\\n*   p.Arg40Cys\_\\n*   p.Ala208Thr\",\n            \"label\":
