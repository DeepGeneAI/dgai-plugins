        \           \"gene\": [\n              \"OTC\"\n            ],\n            \"geneType\":
        \"nuclear\",\n            \"instructionsToUse\": \"*   Females with pathogenic
        OTC variants have highly variable phenotypes and may be asymptomatic with
        normal biochemical values, or be variably affected dependent upon X-Chromosome
