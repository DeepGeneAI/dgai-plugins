<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DeepGene Plugin KPIs</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a2e; padding: 24px; }

    .header { margin-bottom: 24px; }
    .header h1 { font-size: 20px; font-weight: 600; color: #1a1a2e; }
    .header .meta { font-size: 13px; color: #6b7280; margin-top: 4px; }

    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .card { background: white; border-radius: 8px; padding: 20px; border: 1px solid #e5e7eb; }
    .card .label { font-size: 12px; font-weight: 500; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; }
    .card .value { font-size: 32px; font-weight: 700; color: #1a1a2e; margin-top: 8px; }
    .card .sublabel { font-size: 12px; color: #9ca3af; margin-top: 4px; }

    .section { background: white; border-radius: 8px; border: 1px solid #e5e7eb; margin-bottom: 16px; overflow: hidden; }
    .section-header { padding: 16px 20px; border-bottom: 1px solid #f3f4f6; display: flex; align-items: center; gap: 8px; }
    .section-header h2 { font-size: 14px; font-weight: 600; color: #1a1a2e; }
    .section-body { padding: 16px 20px; }

    .invocations-table { width: 100%; border-collapse: collapse; }
    .invocations-table th { text-align: left; font-size: 12px; font-weight: 500; color: #6b7280; padding: 8px 12px; background: #f9fafb; }
    .invocations-table td { padding: 10px 12px; border-top: 1px solid #f3f4f6; font-size: 14px; }
    .bar { height: 6px; background: #e5e7eb; border-radius: 3px; margin-top: 4px; }
    .bar-fill { height: 6px; background: #3b82f6; border-radius: 3px; }

    .inactive-list { display: flex; flex-direction: column; gap: 8px; }
    .inactive-item { display: flex; align-items: center; gap: 8px; font-size: 14px; padding: 8px 12px; background: #fef9c3; border-radius: 6px; border: 1px solid #fde68a; }

    .empty-state { text-align: center; padding: 32px; color: #9ca3af; font-size: 14px; }

    .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 12px; }
    .badge-warning { background: #fef3c7; color: #92400e; }
    .badge-ok { background: #d1fae5; color: #065f46; }

    .loading { text-align: center; padding: 60px; color: #9ca3af; font-size: 14px; }
    .error { background: #fee2e2; border: 1px solid #fca5a5; border-radius: 8px; padding: 16px; color: #991b1b; font-size: 14px; }
  </style>
</head>
<body>
  <div id="app"><div class="loading">Loading KPI data…</div></div>

  <script>
    const SHEET_FILE_ID = '1Sr5ccK7UQl83qPq6d7CaJVVeuxSX8PNfv9beb_vWDA8';

    function parseSheetContent(content) {
      const data = {};
      const lines = content.split('\n');
      let inSummary = false;
      for (const line of lines) {
        if (!line.startsWith('|')) continue;
        const cells = line.split('|').slice(1, -1).map(c =>
          c.trim()
           .replace(/\\_/g, '_')
           .replace(/\\\[/g, '[')
           .replace(/\\\]/g, ']')
        );
        if (!cells.length) continue;
        if (cells.length === 2 && cells[0] === 'key' && cells[1] === 'value') { inSummary = true; continue; }
        if (cells[0].includes(':-:')) continue;
        if (inSummary && cells.length >= 2) data[cells[0]] = cells[1];
      }
      return data;
    }

    function formatDate(isoStr) {
      if (!isoStr) return 'unknown';
      try {
        return new Date(isoStr).toLocaleString('en-US', {
          weekday: 'short', month: 'short', day: 'numeric',
          hour: 'numeric', minute: '2-digit', timeZoneName: 'short'
        });
      } catch(e) { return isoStr; }
    }

    function render(raw) {
      const skillsPublished = parseInt(raw['skills_published'] || '0');
      let invocations = {};
      try { invocations = JSON.parse(raw['invocations_last_7d'] || '{}'); } catch(e) {}
      let inactiveSkills = [];
      try { inactiveSkills = JSON.parse(raw['inactive_skills'] || '[]'); } catch(e) {}
      const outreachSent = parseInt(raw['outreach_packages_sent'] || '0');
      const responsesReceived = parseInt(raw['responses_received'] || '0');
      const responseRate = outreachSent > 0
        ? Math.round((responsesReceived / outreachSent) * 100) + '%' : '—';

      const invEntries = Object.entries(invocations).sort((a, b) => b[1] - a[1]);
      const maxInv = Math.max(1, ...invEntries.map(([,v]) => v));

      document.getElementById('app').innerHTML = `
        <div class="header">
          <h1>DeepGene Plugin KPIs</h1>
          <div class="meta">Last synced: ${formatDate(raw['last_updated'])}</div>
        </div>

        <div class="cards">
          <div class="card">
            <div class="label">Skills Published</div>
            <div class="value">${skillsPublished}</div>
            <div class="sublabel">in marketplace</div>
          </div>
          <div class="card">
            <div class="label">Outreach Packages Sent</div>
            <div class="value">${outreachSent}</div>
            <div class="sublabel">manual counter</div>
          </div>
          <div class="card">
            <div class="label">Responses Received</div>
            <div class="value">${responsesReceived}</div>
            <div class="sublabel">response rate: ${responseRate}</div>
          </div>
        </div>

        <div class="section">
          <div class="section-header">
            <h2>Invocations — last 7 days</h2>
            ${invEntries.length === 0
              ? '<span class="badge badge-warning">No data yet</span>'
              : '<span class="badge badge-ok">' + invEntries.length + ' active</span>'}
          </div>
          <div class="section-body">
            ${invEntries.length === 0
              ? '<div class="empty-state">No invocations in the last 7 days.<br>Run <code>python3 scripts/update-metrics.py --sync-sheets</code> after using skills to see data here.</div>'
              : `<table class="invocations-table">
                  <thead><tr><th>Skill</th><th>Invocations</th><th style="width:45%">Volume</th></tr></thead>
                  <tbody>${invEntries.map(([skill, count]) => `
                    <tr>
                      <td>${skill}</td>
                      <td><strong>${count}</strong></td>
                      <td><div class="bar"><div class="bar-fill" style="width:${Math.round((count/maxInv)*100)}%"></div></div></td>
                    </tr>`).join('')}
                  </tbody>
                </table>`}
          </div>
        </div>

        <div class="section">
          <div class="section-header">
            <h2>Inactive skills — no invocations in 2 weeks</h2>
            ${inactiveSkills.length === 0
              ? '<span class="badge badge-ok">All active</span>'
              : '<span class="badge badge-warning">' + inactiveSkills.length + ' flagged</span>'}
          </div>
          <div class="section-body">
            ${inactiveSkills.length === 0
              ? '<div class="empty-state">All published skills used in the last 2 weeks.</div>'
              : `<div class="inactive-list">${inactiveSkills.map(s =>
                  `<div class="inactive-item"><span>⚠</span><span>${s}</span></div>`
                ).join('')}</div>`}
          </div>
        </div>
      `;
    }

    async function load() {
      try {
        const r = await window.cowork.callMcpTool(
          'mcp__065aa1a9-863c-401d-a46c-7b5338c54177__read_file_content',
          { fileId: SHEET_FILE_ID }
        );
        const parsed = r.structuredContent ?? JSON.parse(r.content[0].text);
        render(parseSheetContent(parsed.fileContent || ''));
      } catch(e) {
        document.getElementById('app').innerHTML =
          `<div class="error">Failed to load KPI data: ${e.message}</div>`;
      }
    }

    load();
  </script>
</body>
</html>
